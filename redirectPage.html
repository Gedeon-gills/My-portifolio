<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background-color: #011627;
        color: #cbd5e1;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
    }

    .stroked-rectangle {
        width: 80%;
        max-width: 800px;
        height: 70%;
        max-height: 500px;
        background-color: transparent;
        border: 3px solid #cbd5e1;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        text-align: center;
    }

    .logo-container {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
        justify-content: center;
    }

    .logo-circle {
        background-color: #cbd5e1;
        color: #011627;
        padding: 10px 20px;
        font-size: 40px;
        font-weight: 700;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .logo-text {
        font-size: 36px;
        font-weight: 700;
        color: #cbd5e1;
    }

    .message {
        font-size: 48px;
        font-weight: 600;
        margin: 10px 0;
    }

    .countdown {
        font-size: 36px;
        margin-top: 20px;
        color: #ff9f1c;
    }

    @media (max-width: 600px) {
        .stroked-rectangle {
            width: 90%;
            height: 60%;
        }

        .logo-circle {
            font-size: 28px;
            padding: 8px 16px;
        }

        .logo-text {
            font-size: 28px;
        }

        .message {
            font-size: 28px;
        }

        .countdown {
            font-size: 24px;
        }
    }
</style>
</head>
<body>
    <div class="stroked-rectangle">
        <div class="logo-container">
            <div class="logo-circle">G</div>
            <div class="logo-text">Gedeon</div>
        </div>
        <div class="message">Welcome to My</div>
        <div class="message">Portfolio</div>
        <div class="countdown" id="countdown">Redirecting in 3...</div>
    </div>

<script>
    let countdown = 3;
    const countdownElement = document.getElementById('countdown');

    const interval = setInterval(() => {
        countdownElement.textContent = `Redirecting in ${countdown}...`;
        countdown--;
        if(countdown < 0){
            clearInterval(interval);
            window.location.href = "homepage.html"; // Redirect
        }
    }, 1000);
</script>
</body>
</html>
